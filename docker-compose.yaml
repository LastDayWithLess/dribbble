version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/symfony:rw
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    networks:
      - symfony-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: symfony_php
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/var/www/symfony:rw
    networks:
      - symfony-network
    command: >
      bash -c "
        composer install &&
        php bin/console doctrine:migrations:migrate --no-interaction &&
        php-fpm
      "

  postgres:
    image: postgres:latest
    container_name: postgres_container
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_DB}
      - POSTGRES_SSL_MODE=${DATABASE_SSL_MODE}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", 
           "pg_isready -U ${DATABASE_USER} -d ${DATABASE_DB} && 
            psql -U ${DATABASE_USER} -d ${DATABASE_DB} -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - symfony-network

networks:
  symfony-network:
    driver: bridge

volumes:
  pgdata: